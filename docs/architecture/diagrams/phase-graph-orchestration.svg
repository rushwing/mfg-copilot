<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Phase Graph Orchestration</title>
  <desc id="desc">Diagram showing phase-based orchestration with searchable nodes, ReAct branches, Reflexion repair, and PR review packet handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="phase" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="search" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="packet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #334155; }
      .section { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .nodeTitle { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 13px Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .label { font: 700 12px Arial, sans-serif; fill: #7c2d12; }
      .outline { stroke: #cbd5e1; stroke-width: 1.5; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="url(#bg)"/>

  <text x="56" y="58" class="title">Phase-Based Orchestration Over Pure ReAct</text>
  <text x="56" y="86" class="subtitle">LangGraph owns the outer phase graph. Search trees appear only inside searchable nodes. ReAct executes within a branch. Reflexion repairs after branch failure.</text>

  <text x="56" y="136" class="section">Platform Truth</text>
  <rect x="56" y="156" width="1288" height="212" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>

  <rect x="88" y="210" width="220" height="106" rx="18" fill="url(#phase)" class="outline"/>
  <text x="112" y="244" class="nodeTitle">requirement_assessment</text>
  <text x="112" y="268" class="body">Assess readiness, risks,</text>
  <text x="112" y="286" class="body">and missing assumptions.</text>

  <rect x="348" y="210" width="220" height="106" rx="18" fill="url(#search)" class="outline"/>
  <text x="372" y="244" class="nodeTitle">test_design</text>
  <text x="372" y="268" class="body">Searchable phase.</text>
  <text x="372" y="286" class="body">Beam / best-first allowed.</text>

  <rect x="608" y="210" width="220" height="106" rx="18" fill="url(#search)" class="outline"/>
  <text x="632" y="244" class="nodeTitle">implementation</text>
  <text x="632" y="268" class="body">Searchable phase.</text>
  <text x="632" y="286" class="body">ReAct runs inside branch.</text>

  <rect x="868" y="210" width="220" height="106" rx="18" fill="url(#search)" class="outline"/>
  <text x="892" y="244" class="nodeTitle">review_and_repair</text>
  <text x="892" y="268" class="body">Searchable phase.</text>
  <text x="892" y="286" class="body">Reflexion guides next attempt.</text>

  <rect x="1128" y="210" width="184" height="106" rx="18" fill="url(#packet)" class="outline"/>
  <text x="1152" y="244" class="nodeTitle">pr_packet_and_handoff</text>
  <text x="1152" y="268" class="body">Emit review packet,</text>
  <text x="1152" y="286" class="body">checklist, and visuals.</text>

  <path d="M308 263 H348" class="arrow"/>
  <path d="M568 263 H608" class="arrow"/>
  <path d="M828 263 H868" class="arrow"/>
  <path d="M1088 263 H1128" class="arrow"/>

  <text x="56" y="424" class="section">Searchable Node Pattern</text>
  <rect x="56" y="444" width="876" height="468" rx="22" fill="#fffaf5" stroke="#fdba74" stroke-width="1.5"/>

  <rect x="112" y="512" width="176" height="78" rx="16" fill="#ffffff" class="outline"/>
  <text x="134" y="542" class="nodeTitle">Parent phase node</text>
  <text x="134" y="563" class="small">Search starts only here</text>

  <rect x="380" y="490" width="198" height="92" rx="16" fill="#ffffff" class="outline"/>
  <text x="404" y="520" class="nodeTitle">Branch A</text>
  <text x="404" y="543" class="body">hypothesis: adapter timeout</text>
  <text x="404" y="562" class="body">score: 0.72</text>

  <rect x="380" y="626" width="198" height="92" rx="16" fill="#ffffff" class="outline"/>
  <text x="404" y="656" class="nodeTitle">Branch B</text>
  <text x="404" y="679" class="body">hypothesis: schema mismatch</text>
  <text x="404" y="698" class="body">score: 0.81</text>

  <rect x="380" y="762" width="198" height="92" rx="16" fill="#ffffff" class="outline"/>
  <text x="404" y="792" class="nodeTitle">Branch C</text>
  <text x="404" y="815" class="body">hypothesis: stale cache path</text>
  <text x="404" y="834" class="body">score: 0.34</text>

  <rect x="664" y="488" width="212" height="100" rx="16" fill="#f8fafc" class="outline"/>
  <text x="688" y="518" class="nodeTitle">ReAct inside branch</text>
  <text x="688" y="541" class="body">reason -> act -> observe</text>
  <text x="688" y="560" class="body">bounded by time and budget</text>

  <rect x="664" y="668" width="212" height="100" rx="16" fill="#f8fafc" class="outline"/>
  <text x="688" y="698" class="nodeTitle">Reflexion after failure</text>
  <text x="688" y="721" class="body">summarize failure</text>
  <text x="688" y="740" class="body">propose next branch</text>

  <path d="M288 551 H380" class="arrow"/>
  <path d="M288 551 C326 551, 326 672, 380 672" class="arrow"/>
  <path d="M288 551 C326 551, 326 808, 380 808" class="arrow"/>

  <path d="M578 536 H664" class="arrow"/>
  <path d="M578 672 H664" class="arrow"/>
  <path d="M578 808 C628 808, 628 718, 664 718" class="dash"/>
  <path d="M876 718 C916 718, 916 672, 578 672" class="dash"/>

  <text x="112" y="892" class="label">Branch record fields</text>
  <text x="112" y="916" class="body">branch_id, parent_branch_id, hypothesis, attempt, score, failure_reason, artifacts</text>

  <text x="972" y="424" class="section">PR Review Packet</text>
  <rect x="972" y="444" width="372" height="468" rx="22" fill="#f0fdfa" stroke="#67e8f9" stroke-width="1.5"/>

  <rect x="1004" y="486" width="308" height="360" rx="18" fill="#ffffff" class="outline"/>
  <text x="1030" y="522" class="nodeTitle">Normalized packet output</text>
  <text x="1030" y="555" class="body">1. Executive summary</text>
  <text x="1030" y="581" class="body">2. REQ / ADR references</text>
  <text x="1030" y="607" class="body">3. Changed-area table</text>
  <text x="1030" y="633" class="body">4. Validation results table</text>
  <text x="1030" y="659" class="body">5. Risk matrix</text>
  <text x="1030" y="685" class="body">6. Reviewer checklist</text>
  <text x="1030" y="711" class="body">7. Architecture-impact visual</text>
  <text x="1030" y="746" class="small">Recommended generation mode:</text>
  <text x="1030" y="766" class="small">draft_then_structure</text>
  <text x="1030" y="800" class="small">Output becomes the final HITL handoff artifact.</text>

  <path d="M1220 316 V444" class="arrow"/>
</svg>
