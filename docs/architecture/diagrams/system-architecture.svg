<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1700" viewBox="0 0 1800 1700" role="img" aria-labelledby="title desc">
  <title id="title">NVIDIA MFG Copilot System Architecture</title>
  <desc id="desc">High-level architecture diagram showing portal, router, agents, shared runtime, supporting layers, repository boundaries, and primary flows.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="portalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="supportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="repoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 32px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Helvetica Neue', Arial, sans-serif; fill: #1e293b; }
      .section-title { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; letter-spacing: 0.4px; }
      .section-caption { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .box-title-light { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .box-title-dark { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .box-copy-light { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .box-copy-dark { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #1e293b; }
      .small-copy { font: 500 12px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .mono { font: 600 12px Menlo, Monaco, Consolas, monospace; fill: #0f172a; }
      .pill { font: 700 11px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; letter-spacing: 0.8px; }
      .flow-title { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .flow-copy { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #1e293b; }
      .divider { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 6 6; }
      .connector { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft-connector { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1800" height="1700" fill="url(#bg)"/>
  <rect x="40" y="28" width="1720" height="92" rx="24" fill="url(#header)" filter="url(#shadow)"/>
  <text x="74" y="73" class="title">NVIDIA MFG Copilot</text>
  <text x="74" y="100" class="subtitle">Product Scope / High-Level Architecture</text>
  <text x="1420" y="73" class="subtitle">Derived from system_architecture.md</text>
  <text x="1420" y="100" class="subtitle">Access, routing, agents, runtime, tools, data, repos</text>

  <g>
    <text x="60" y="164" class="section-title">1. Access And Routing</text>
    <text x="60" y="186" class="section-caption">Users enter through a unified gateway, then the router selects an agent using role, intent, phase, and safety policy.</text>
  </g>

  <rect x="110" y="225" width="180" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="262" text-anchor="middle" class="box-title-dark">Users</text>
  <text x="200" y="287" text-anchor="middle" class="box-copy-dark">Web / Chat / API</text>

  <rect x="380" y="200" width="1040" height="140" rx="22" fill="url(#portalGrad)" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="244" text-anchor="middle" class="box-title-light">Unified Portal / API Gateway</text>
  <text x="900" y="272" text-anchor="middle" class="box-copy-light">SSO / Login | Role Resolver | Session Context | Audit Trail | Approval Inbox</text>
  <rect x="440" y="290" width="190" height="28" rx="14" fill="#eff6ff"/>
  <text x="535" y="309" text-anchor="middle" class="pill">ENTRY SURFACE</text>
  <rect x="645" y="290" width="190" height="28" rx="14" fill="#dbeafe"/>
  <text x="740" y="309" text-anchor="middle" class="pill">IDENTITY CONTEXT</text>
  <rect x="850" y="290" width="190" height="28" rx="14" fill="#bfdbfe"/>
  <text x="945" y="309" text-anchor="middle" class="pill">AUDIT AND APPROVAL</text>
  <rect x="1055" y="290" width="240" height="28" rx="14" fill="#93c5fd"/>
  <text x="1175" y="309" text-anchor="middle" class="pill">USER ROLE + INTENT + PHASE</text>

  <path d="M 290 270 L 380 270" class="connector"/>

  <rect x="500" y="390" width="800" height="150" rx="22" fill="url(#routerGrad)" stroke="#5eead4" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="434" text-anchor="middle" class="box-title-light">Agent Router</text>
  <text x="900" y="462" text-anchor="middle" class="box-copy-light">Routing Policy: role-based routing, intent classification, phase/checkpoint awareness, safety policy</text>
  <rect x="570" y="485" width="160" height="30" rx="15" fill="#ffffff"/>
  <text x="650" y="505" text-anchor="middle" class="pill">READ ONLY</text>
  <rect x="820" y="485" width="160" height="30" rx="15" fill="#ecfeff"/>
  <text x="900" y="505" text-anchor="middle" class="pill">APPROVAL NEEDED</text>
  <rect x="1070" y="485" width="160" height="30" rx="15" fill="#ccfbf1"/>
  <text x="1150" y="505" text-anchor="middle" class="pill">EXECUTE</text>

  <path d="M 900 340 L 900 390" class="connector"/>

  <g>
    <text x="60" y="592" class="section-title">2. Specialized Agents</text>
    <text x="60" y="614" class="section-caption">Three task-focused agents handle documentation, deployment, and operations across the manufacturing lifecycle.</text>
  </g>

  <rect x="160" y="650" width="440" height="220" rx="22" fill="url(#agentGrad)" stroke="#bfdbfe" stroke-width="3" filter="url(#shadow)"/>
  <rect x="160" y="650" width="440" height="54" rx="22" fill="#dbeafe"/>
  <text x="380" y="684" text-anchor="middle" class="box-title-dark">Doc Copilot</text>
  <text x="380" y="710" text-anchor="middle" class="small-copy">Phase Prep</text>
  <text x="195" y="748" class="box-copy-dark">- Doc Q&amp;A</text>
  <text x="195" y="776" class="box-copy-dark">- Template fill</text>
  <text x="195" y="804" class="box-copy-dark">- Gap detection</text>
  <text x="195" y="832" class="box-copy-dark">- Summary reports</text>

  <rect x="680" y="650" width="440" height="220" rx="22" fill="url(#agentGrad)" stroke="#a7f3d0" stroke-width="3" filter="url(#shadow)"/>
  <rect x="680" y="650" width="440" height="54" rx="22" fill="#d1fae5"/>
  <text x="900" y="684" text-anchor="middle" class="box-title-dark">Deploy Agent</text>
  <text x="900" y="710" text-anchor="middle" class="small-copy">Station Bringup</text>
  <text x="715" y="748" class="box-copy-dark">- IQ/OQ workflow</text>
  <text x="715" y="776" class="box-copy-dark">- Deployment plan</text>
  <text x="715" y="804" class="box-copy-dark">- MES/SFC checks</text>
  <text x="715" y="832" class="box-copy-dark">- Software distribution and approval gates</text>

  <rect x="1200" y="650" width="440" height="220" rx="22" fill="url(#agentGrad)" stroke="#fde68a" stroke-width="3" filter="url(#shadow)"/>
  <rect x="1200" y="650" width="440" height="54" rx="22" fill="#fef3c7"/>
  <text x="1420" y="684" text-anchor="middle" class="box-title-dark">Ops Agent</text>
  <text x="1420" y="710" text-anchor="middle" class="small-copy">Build / MP Ops</text>
  <text x="1235" y="748" class="box-copy-dark">- Triage and log analysis</text>
  <text x="1235" y="776" class="box-copy-dark">- Environment and network diagnostics</text>
  <text x="1235" y="804" class="box-copy-dark">- FA assist and bug-fix workflow</text>
  <text x="1235" y="832" class="box-copy-dark">- Daily / weekly reporting</text>

  <path d="M 760 540 L 380 650" class="soft-connector"/>
  <path d="M 900 540 L 900 650" class="soft-connector"/>
  <path d="M 1040 540 L 1420 650" class="soft-connector"/>

  <g>
    <text x="60" y="928" class="section-title">3. Shared Runtime And Foundation</text>
    <text x="60" y="950" class="section-caption">All agents run through a common orchestration layer that provides policies, memory, tool access, observability, and supporting services.</text>
  </g>

  <rect x="260" y="985" width="1280" height="120" rx="24" fill="url(#runtimeGrad)" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="1027" text-anchor="middle" class="box-title-light">Shared Agent Runtime Layer</text>
  <text x="900" y="1056" text-anchor="middle" class="box-copy-light">LangGraph Orchestrator | Tool Registry | Prompt/Policy Layer | Memory | Observability</text>
  <text x="900" y="1082" text-anchor="middle" class="box-copy-light">Retry / Timeout | Human-in-loop | Task State Machine | Trace | Cost Control</text>

  <path d="M 380 870 L 540 985" class="soft-connector"/>
  <path d="M 900 870 L 900 985" class="soft-connector"/>
  <path d="M 1420 870 L 1260 985" class="soft-connector"/>

  <rect x="70" y="1140" width="350" height="140" rx="20" fill="url(#supportGrad)" stroke="#bfdbfe" stroke-width="3" filter="url(#shadow)"/>
  <text x="245" y="1176" text-anchor="middle" class="box-title-dark">RAG Layer</text>
  <text x="95" y="1206" class="box-copy-dark">- KB retriever</text>
  <text x="95" y="1230" class="box-copy-dark">- DB retriever and hybrid search</text>
  <text x="95" y="1254" class="box-copy-dark">- Reranker and citation builder</text>

  <rect x="470" y="1140" width="350" height="140" rx="20" fill="url(#supportGrad)" stroke="#c4b5fd" stroke-width="3" filter="url(#shadow)"/>
  <text x="645" y="1176" text-anchor="middle" class="box-title-dark">Model Gateway</text>
  <text x="495" y="1206" class="box-copy-dark">- Local model route: SGLang</text>
  <text x="495" y="1230" class="box-copy-dark">- Remote commercial LLM route</text>
  <text x="495" y="1254" class="box-copy-dark">- Policy by task, PII/export control, fallback/quota</text>

  <rect x="870" y="1140" width="430" height="140" rx="20" fill="url(#supportGrad)" stroke="#a7f3d0" stroke-width="3" filter="url(#shadow)"/>
  <text x="1085" y="1176" text-anchor="middle" class="box-title-dark">Enterprise Tools</text>
  <text x="895" y="1206" class="box-copy-dark">- MES / SFC</text>
  <text x="895" y="1230" class="box-copy-dark">- Software distribution platform</text>
  <text x="895" y="1254" class="box-copy-dark">- CMDB, asset inventory, logs, metrics, alerts, ticketing, Git/CI</text>

  <rect x="1350" y="1140" width="380" height="140" rx="20" fill="url(#supportGrad)" stroke="#fcd34d" stroke-width="3" filter="url(#shadow)"/>
  <text x="1540" y="1176" text-anchor="middle" class="box-title-dark">Data Products</text>
  <text x="1375" y="1206" class="box-copy-dark">- Project master and Product / SKU</text>
  <text x="1375" y="1230" class="box-copy-dark">- Build records, Yield / UPH</text>
  <text x="1375" y="1254" class="box-copy-dark">- Failure history, FA / repair data</text>

  <path d="M 540 1105 L 245 1140" class="soft-connector"/>
  <path d="M 780 1105 L 645 1140" class="soft-connector"/>
  <path d="M 1020 1105 L 1085 1140" class="soft-connector"/>
  <path d="M 1260 1105 L 1540 1140" class="soft-connector"/>

  <line x1="60" y1="558" x2="1740" y2="558" class="divider"/>

  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="360" height="200" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="26" y="36" class="flow-title">Routing Inputs</text>
    <text x="26" y="68" class="flow-copy">Role</text>
    <text x="26" y="94" class="flow-copy">Intent</text>
    <text x="26" y="120" class="flow-copy">Phase / checkpoint</text>
    <text x="26" y="146" class="flow-copy">Station / site context</text>
    <text x="26" y="172" class="flow-copy">Safety mode and execution permission</text>
  </g>

  <g transform="translate(60, 970)">
    <rect x="0" y="0" width="1680" height="2" fill="#94a3b8" opacity="0.4"/>
  </g>

  <line x1="60" y1="1308" x2="1740" y2="1308" class="divider"/>

  <g transform="translate(60, 1350)">
    <text x="0" y="0" class="section-title">4. Repo Boundary And Build Scope</text>
    <text x="0" y="22" class="section-caption">The architecture is split between a knowledge-base repository and a monorepo that hosts user-facing apps plus shared packages.</text>
  </g>

  <g transform="translate(60, 1388)">
    <rect x="0" y="0" width="520" height="230" rx="24" fill="url(#repoGrad)" stroke="#67e8f9" stroke-width="3" filter="url(#shadow)"/>
    <text x="28" y="38" class="box-title-dark">Repo 1: mfg-project-lifecycle-kb</text>
    <text x="28" y="72" class="box-copy-dark">- phase / checkpoint templates</text>
    <text x="28" y="100" class="box-copy-dark">- glossary and i18n</text>
    <text x="28" y="128" class="box-copy-dark">- frontmatter schema and checkpoint index</text>
    <text x="28" y="156" class="box-copy-dark">- doc index</text>
    <text x="28" y="184" class="box-copy-dark">- versioned KB release artifacts</text>
  </g>

  <g transform="translate(620, 1388)">
    <rect x="0" y="0" width="760" height="230" rx="24" fill="url(#repoGrad)" stroke="#22d3ee" stroke-width="3" filter="url(#shadow)"/>
    <text x="28" y="38" class="box-title-dark">Repo 2: mfg-copilot-monorepo</text>
    <text x="28" y="72" class="mono">apps/</text>
    <text x="48" y="100" class="box-copy-dark">- portal-web</text>
    <text x="48" y="126" class="box-copy-dark">- agent-router</text>
    <text x="48" y="152" class="box-copy-dark">- doc-copilot</text>
    <text x="48" y="178" class="box-copy-dark">- deploy-agent</text>
    <text x="48" y="204" class="box-copy-dark">- ops-agent</text>
    <text x="390" y="72" class="mono">packages/</text>
    <text x="410" y="100" class="box-copy-dark">- agent-core, rag-core, kb-client, model-gateway</text>
    <text x="410" y="126" class="box-copy-dark">- auth-rbac, approval-engine, shared-schemas</text>
    <text x="410" y="152" class="box-copy-dark">- tool-mes, tool-distribution, tool-observability</text>
  </g>

  <g transform="translate(1410, 1388)">
    <rect x="0" y="0" width="330" height="230" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="24" y="38" class="flow-title">Primary Flows</text>
    <text x="24" y="72" class="flow-copy">1. Document Copilot</text>
    <text x="24" y="94" class="small-copy">Portal -&gt; Router -&gt; Doc Copilot -&gt; KB + DB -&gt; structured output</text>
    <text x="24" y="128" class="flow-copy">2. Deployment Agent</text>
    <text x="24" y="150" class="small-copy">Portal -&gt; Router -&gt; plan -&gt; approval -&gt; MES / distribution -&gt; evidence</text>
    <text x="24" y="184" class="flow-copy">3. Ops Agent</text>
    <text x="24" y="206" class="small-copy">Alert / user -&gt; triage -&gt; diagnostics -&gt; fix or escalate -&gt; RCA / FA</text>
  </g>
</svg>
