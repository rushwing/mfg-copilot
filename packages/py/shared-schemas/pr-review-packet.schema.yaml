$schema: "https://json-schema.org/draft/2020-12/schema"
title: PRReviewPacket
type: object
required:
  - schema_id
  - schema_version
  - packet_id
  - pr_number
  - pr_title
  - generation_mode
  - artifact
  - linked_adrs
  - summary
  - linked_requirements
  - validation
  - risks
  - reviewer_checklist
  - visuals
additionalProperties: false
properties:
  schema_id:
    type: string
    const: pr-review-packet
    description: Stable identifier for the shared PR review packet contract.
  schema_version:
    type: string
    pattern: "^v[0-9]+$"
    description: Contract version for packet producers and consumers.
  packet_id:
    type: string
    pattern: "^pr-[0-9]+-review-packet$"
  pr_number:
    type: integer
    minimum: 1
  pr_title:
    type: string
  generation_mode:
    type: string
    enum:
      - direct_structured
      - draft_then_structure
    description: Generation mode for the packet artifact itself, not for the user prompt.
  artifact:
    type: object
    required:
      - artifact_root
      - machine_packet_path
      - reviewer_packet_path
      - visuals_dir
    additionalProperties: false
    description: Repository-relative artifact envelope for packet outputs.
    properties:
      artifact_root:
        type: string
        pattern: "^artifacts/pr-review-packets/pr-[0-9]+$"
      machine_packet_path:
        type: string
        pattern: "^artifacts/pr-review-packets/pr-[0-9]+/review-packet\\.json$"
      reviewer_packet_path:
        type: string
        pattern: "^artifacts/pr-review-packets/pr-[0-9]+/review-packet\\.md$"
      visuals_dir:
        type: string
        pattern: "^artifacts/pr-review-packets/pr-[0-9]+/visuals$"
  linked_requirements:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^REQ-[0-9]{3}$"
  linked_adrs:
    type: array
    items:
      type: string
      pattern: "^\\d{4}-[a-z0-9][a-z0-9-]*$"
      description: Repository ADR file stem, for example 0003-structured-io-and-constrained-generation
  summary:
    type: object
    required:
      - executive_summary
      - changed_areas
    additionalProperties: false
    description: Reviewer-facing prose lives here; the remaining sections stay strongly structured.
    properties:
      executive_summary:
        type: string
        minLength: 1
        description: Human-readable markdown or prose summary for reviewers.
      changed_areas:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - area
            - impact
          additionalProperties: false
          properties:
            area:
              type: string
            impact:
              type: string
            files:
              type: array
              items:
                type: string
  validation:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - check
        - status
      additionalProperties: false
      properties:
        check:
          type: string
        status:
          type: string
          enum:
            - passed
            - failed
            - skipped
        evidence:
          type: string
  risks:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - category
        - severity
        - note
      additionalProperties: false
      properties:
        category:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
        note:
          type: string
        mitigation:
          type: string
  reviewer_checklist:
    type: array
    minItems: 1
    items:
      type: string
  visuals:
    type: array
    items:
      type: object
      required:
        - type
        - title
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - svg
            - mermaid
            - table
        title:
          type: string
        path:
          type: string
    description: Visual references stay structured even when the reviewer-facing layout evolves later.
