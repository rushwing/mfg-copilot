name: Shared Schema Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-review-packet-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR review packet contract
        run: python3 scripts/check-pr-review-packet-contract.py
