name: PR Review Packet Gating

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-review-packet-gating:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR review packet gating rules
        run: python3 scripts/check-pr-review-packet-gating.py
